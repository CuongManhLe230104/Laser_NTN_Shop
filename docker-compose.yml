services:
  # =============================================
  # DATABASE — MySQL 8.0
  # =============================================
  db:
    image: mysql:8.0
    container_name: laser_ntn_db
    restart: unless-stopped
    environment:
      MYSQL_ROOT_PASSWORD: ${MYSQL_ROOT_PASSWORD}
      MYSQL_DATABASE: ${MYSQL_DATABASE}
      MYSQL_USER: ${MYSQL_USER}
      MYSQL_PASSWORD: ${MYSQL_PASSWORD}
    ports:
      - "3308:3306"
    volumes:
      - mysql_data:/var/lib/mysql
      - ./database/init.sql:/docker-entrypoint-initdb.d/init.sql:ro
    networks:
      - laser_ntn_network
    healthcheck:
      test: ["CMD", "mysqladmin", "ping", "-h", "localhost", "-u", "root", "-p${MYSQL_ROOT_PASSWORD}"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 30s

  # =============================================
  # BACKEND — Node.js + Express
  # =============================================
  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    container_name: laser_ntn_backend
    restart: unless-stopped
    environment:
      NODE_ENV: ${NODE_ENV:-development}
      PORT: ${BACKEND_PORT:-5000}
      DB_HOST: db
      DB_PORT: 3306
      DB_NAME: ${MYSQL_DATABASE}
      DB_USER: ${MYSQL_USER}
      DB_PASSWORD: ${MYSQL_PASSWORD}
      JWT_SECRET: ${JWT_SECRET}
      JWT_EXPIRES_IN: ${JWT_EXPIRES_IN:-7d}
    ports:
      - "5000:5000"
    volumes:
      - ./backend:/app
      - /app/node_modules
    networks:
      - laser_ntn_network
    depends_on:
      db:
        condition: service_healthy

  # =============================================
  # FRONTEND — React + Vite + Nginx
  # =============================================
  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
    container_name: laser_ntn_frontend
    restart: unless-stopped
    ports:
      - "3000:80"
    networks:
      - laser_ntn_network
    depends_on:
      - backend

# =============================================
# VOLUMES & NETWORKS
# =============================================
volumes:
  mysql_data:
    name: laser_ntn_mysql_data

networks:
  laser_ntn_network:
    name: laser_ntn_network
    driver: bridge
